# Default HTTP vhost — works on first boot before TLS certs exist.
# After issuing certs into nginx/certs/wallbang.xyz/, replace this file with
# nginx/conf.d/wallbang.ssl.conf.example (or merge the SSL server block).

upstream wallbang_next {
    server nextjs:3000;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name wallbang.xyz www.wallbang.xyz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /_next/static/ {
        proxy_pass http://wallbang_next;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://wallbang_next;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
