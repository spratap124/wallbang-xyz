# Production TLS vhost. Certs are expected at nginx/certs/wallbang.xyz/.
# For first-boot HTTP-only (before certs), see wallbang.http.conf.example.

upstream wallbang_next {
    server nextjs:3000;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name wallbang.xyz www.wallbang.xyz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name wallbang.xyz www.wallbang.xyz;

    ssl_certificate     /etc/nginx/certs/wallbang.xyz/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/wallbang.xyz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    server_tokens off;

    # Cosmetics catalog ingest POSTs can be ~1–2 MB.
    client_max_body_size 5m;

    location /_next/static/ {
        proxy_pass http://wallbang_next;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
        include /etc/nginx/includes/security-headers.conf;
    }

    location / {
        proxy_pass http://wallbang_next;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        include /etc/nginx/includes/security-headers.conf;
    }
}
